name: LocalLLMChat
options:
  bundleIdPrefix: com.vesco
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    branch: main
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    branch: main
targets:
  LocalLLMChat:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [LocalLLMChat]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vesco.LocalLLMChatBot-5555
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIRequiresFullScreen: YES
      INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Requires local network access to find Ollama."
      DEVELOPMENT_TEAM: ""
      ENABLE_USER_SCRIPT_SANDBOXING: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
